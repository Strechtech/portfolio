<section class="relative isolate overflow-hidden bg-base-100 px-4 py-20 lg:py-28">
  <div class="bg-grid absolute inset-0 -z-10"></div>
  <div class="glow-blob -z-10 -top-10 right-1/4 size-72 bg-primary opacity-25"></div>

  <div class="mx-auto max-w-5xl">
    <!-- Header -->
    <p class="flex items-center gap-2 text-sm font-semibold uppercase tracking-wide text-primary">
      <fa-icon [icon]="faFolderOpen"></fa-icon>
      Proyectos
    </p>
    <h1 class="mt-3 text-4xl font-bold sm:text-5xl">
      Trabajos <span class="text-gradient">seleccionados</span>
    </h1>
    <p class="mt-3 max-w-xl text-base-content/60">
      Lo que construí y el problema que resolví en cada uno.
    </p>

    <div class="mt-12 grid gap-5 sm:grid-cols-2">
      @for (p of projects; track p.name) {
        <div
          class="ring-gradient card-lift group flex flex-col rounded-box border border-base-300/60 bg-base-200/40 p-6 backdrop-blur">
          <div class="flex items-start justify-between gap-3">
            <span
              class="grid size-11 place-items-center rounded-field bg-primary/10 text-primary transition-colors group-hover:bg-primary group-hover:text-primary-content">
              <fa-icon [icon]="faCode" class="text-lg"></fa-icon>
            </span>
            <div class="flex gap-1">
              @if (p.repo) {
                <a
                  [href]="p.repo"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Código"
                  class="btn btn-ghost btn-circle btn-sm text-base-content/60 hover:text-primary">
                  <fa-icon [icon]="faGithub"></fa-icon>
                </a>
              }
              @if (p.url) {
                <a
                  [href]="p.url"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Ver"
                  class="btn btn-ghost btn-circle btn-sm text-base-content/60 hover:text-primary">
                  <fa-icon [icon]="faArrowUpRightFromSquare"></fa-icon>
                </a>
              }
            </div>
          </div>

          <h2 class="mt-4 text-lg font-semibold">{{ p.name }}</h2>
          <p class="mt-2 grow text-sm leading-relaxed text-base-content/65">{{ p.description }}</p>

          <div class="mt-5 flex flex-wrap gap-2">
            @for (tag of p.tags; track tag) {
              <span
                class="rounded-full border border-base-300 bg-base-100/60 px-2.5 py-0.5 text-xs text-base-content/70">
                {{ tag }}
              </span>
            }
          </div>
        </div>
      }
    </div>

    <div class="mt-16 flex flex-col items-center gap-4 text-center">
      <p class="text-sm uppercase tracking-wider text-base-content/40">
        ¿Qué validó esta experiencia?
      </p>
      <a routerLink="/certificaciones" class="btn btn-primary gap-2">
        Ver certificaciones
        <fa-icon [icon]="faArrowUpRightFromSquare"></fa-icon>
      </a>
    </div>
  </div>
</section>
